<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 645" width="860" height="645"
     font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
    <marker id="arrRed" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
    <marker id="arrOrange" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="645" fill="#f5f6fa"/>

  <!-- ── Title ── -->
  <text x="430" y="21" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">
    AuraPlay 2.0 — RAG Pipeline Architecture
  </text>

  <!-- ═══════════════════════════════════════════
       BOXES
  ═══════════════════════════════════════════ -->

  <!-- 1. User Input -->
  <rect x="305" y="32" width="250" height="48" rx="8" fill="#dfe6e9" stroke="#636e72" stroke-width="1.5"/>
  <text x="430" y="52" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3436">User Input</text>
  <text x="430" y="69" text-anchor="middle" font-size="10" fill="#636e72">"upbeat pop music for the gym"</text>

  <!-- 2. CLI Entry Point -->
  <rect x="305" y="112" width="250" height="48" rx="7" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1.5"/>
  <text x="430" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3436">src/main.py</text>
  <text x="430" y="149" text-anchor="middle" font-size="10" fill="#636e72">CLI entry point · setup_logging()</text>

  <!-- 3. data/songs.csv  (data store, salmon) -->
  <rect x="20" y="210" width="145" height="60" rx="7" fill="#fab1a0" stroke="#e17055" stroke-width="1.5"/>
  <text x="92" y="231" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d3436">data/songs.csv</text>
  <text x="92" y="247" text-anchor="middle" font-size="10" fill="#636e72">18-song catalog</text>
  <text x="92" y="261" text-anchor="middle" font-size="10" fill="#636e72">genre · mood · features</text>

  <!-- 4. TF-IDF Retriever  (RAG, green) — Step 1 -->
  <rect x="185" y="202" width="220" height="74" rx="7" fill="#b2f0a4" stroke="#27ae60" stroke-width="1.8"/>
  <text x="295" y="220" text-anchor="middle" font-size="9" fill="#27ae60" font-style="italic">Step 1 · Retrieve</text>
  <text x="295" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3436">TF-IDF Retriever</text>
  <text x="295" y="250" text-anchor="middle" font-size="10" fill="#27ae60" font-style="italic">src/retrieval.py</text>
  <text x="295" y="264" text-anchor="middle" font-size="10" fill="#636e72">retrieve_songs(query, songs)</text>
  <text x="295" y="277" text-anchor="middle" font-size="10" fill="#636e72">cosine similarity on song docs</text>

  <!-- 5. Query Parser  (RAG, green) — Step 2 -->
  <rect x="435" y="202" width="220" height="74" rx="7" fill="#b2f0a4" stroke="#27ae60" stroke-width="1.8"/>
  <text x="545" y="220" text-anchor="middle" font-size="9" fill="#27ae60" font-style="italic">Step 2 · Parse</text>
  <text x="545" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3436">Query Parser</text>
  <text x="545" y="250" text-anchor="middle" font-size="10" fill="#27ae60" font-style="italic">src/retrieval.py</text>
  <text x="545" y="264" text-anchor="middle" font-size="10" fill="#636e72">parse_query_preferences(query)</text>
  <text x="545" y="277" text-anchor="middle" font-size="10" fill="#636e72">keyword → structured prefs</text>

  <!-- 6. Candidate Pool  (intermediate, blue-gray) -->
  <rect x="185" y="325" width="220" height="56" rx="6" fill="#e8f4f8" stroke="#74b9ff" stroke-width="1.5"/>
  <text x="295" y="347" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3436">Candidate Pool</text>
  <text x="295" y="362" text-anchor="middle" font-size="10" fill="#636e72">top-k semantically relevant songs</text>
  <text x="295" y="374" text-anchor="middle" font-size="10" fill="#0984e3">subset of catalog only ✓</text>

  <!-- 7. Structured Preferences  (intermediate, blue-gray) -->
  <rect x="435" y="325" width="220" height="56" rx="6" fill="#e8f4f8" stroke="#74b9ff" stroke-width="1.5"/>
  <text x="545" y="347" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3436">Structured Preferences</text>
  <text x="545" y="362" text-anchor="middle" font-size="10" fill="#636e72">{ energy: 0.9, genre: "pop",</text>
  <text x="545" y="374" text-anchor="middle" font-size="10" fill="#636e72">valence: 0.8, tempo_bpm: 130 }</text>

  <!-- 8. Scorer  (purple) — Step 3 -->
  <rect x="290" y="422" width="280" height="64" rx="7" fill="#a29bfe" stroke="#6c5ce7" stroke-width="1.8"/>
  <text x="430" y="440" text-anchor="middle" font-size="9" fill="#dfe6e9" font-style="italic">Step 3 · Score</text>
  <text x="430" y="454" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Scorer · src/recommender.py</text>
  <text x="430" y="469" text-anchor="middle" font-size="10" fill="#dfe6e9">score_song(prefs, song)  ·  max 7.75 pts</text>
  <text x="430" y="479" text-anchor="middle" font-size="9" fill="#dfe6e9">genre · mood · energy · valence · danceability · tempo</text>

  <!-- 9. Ranked Output  (blue) — Step 4 -->
  <rect x="235" y="532" width="330" height="62" rx="7" fill="#74b9ff" stroke="#0984e3" stroke-width="1.8"/>
  <text x="400" y="550" text-anchor="middle" font-size="9" fill="#dfe6e9" font-style="italic">Step 4 · Rank &amp; Explain</text>
  <text x="400" y="564" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Ranked Recommendations</text>
  <text x="400" y="580" text-anchor="middle" font-size="10" fill="#dfe6e9">(song, score, explanation) × k  ·  printed to terminal</text>

  <!-- 10. Testing & Human Review  (dashed amber) -->
  <rect x="592" y="398" width="248" height="232" rx="8"
        fill="#fff8e1" stroke="#f0a500" stroke-width="1.8" stroke-dasharray="7,4"/>
  <text x="716" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#795548">Testing &amp; Human Review</text>
  <line x1="600" y1="430" x2="832" y2="430" stroke="#e0c070" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="716" y="450" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">pytest  (19 tests)</text>
  <text x="716" y="467" text-anchor="middle" font-size="10" fill="#636e72">• catalog containment</text>
  <text x="716" y="482" text-anchor="middle" font-size="10" fill="#636e72">• empty query does not crash</text>
  <text x="716" y="497" text-anchor="middle" font-size="10" fill="#636e72">• explanations non-empty</text>
  <text x="716" y="512" text-anchor="middle" font-size="10" fill="#636e72">• numeric preference clamping</text>
  <text x="716" y="527" text-anchor="middle" font-size="10" fill="#636e72">• end-to-end RAG pipeline</text>
  <line x1="600" y1="540" x2="832" y2="540" stroke="#e0c070" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="716" y="560" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">Human Review</text>
  <text x="716" y="577" text-anchor="middle" font-size="10" fill="#636e72">reads terminal output</text>
  <text x="716" y="592" text-anchor="middle" font-size="10" fill="#636e72">validates song relevance &amp; quality</text>
  <text x="716" y="607" text-anchor="middle" font-size="10" fill="#636e72">spots bias and catalog gaps</text>

  <!-- 11. Legend -->
  <rect x="20" y="520" width="200" height="115" rx="6" fill="#f5f6fa" stroke="#bdc3c7" stroke-width="1"/>
  <text x="120" y="539" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d3436">Legend</text>
  <line x1="32" y1="555" x2="76" y2="555" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="85" y="559" font-size="10" fill="#2d3436">data / control flow</text>
  <line x1="32" y1="574" x2="76" y2="574" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,2" marker-end="url(#arrRed)"/>
  <text x="85" y="578" font-size="10" fill="#2d3436">data source (CSV feed)</text>
  <line x1="32" y1="593" x2="76" y2="593" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrOrange)"/>
  <text x="85" y="597" font-size="10" fill="#2d3436">testing / human check</text>
  <rect x="32" y="607" width="13" height="10" rx="2" fill="#b2f0a4" stroke="#27ae60" stroke-width="1"/>
  <text x="85" y="617" font-size="10" fill="#2d3436">RAG component</text>
  <rect x="32" y="622" width="13" height="10" rx="2" fill="#a29bfe" stroke="#6c5ce7" stroke-width="1"/>
  <text x="85" y="632" font-size="10" fill="#2d3436">scoring / ranking</text>

  <!-- ═══════════════════════════════════════════
       ARROWS
  ═══════════════════════════════════════════ -->

  <!-- User Input → CLI -->
  <line x1="430" y1="80" x2="430" y2="112" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- CLI → TF-IDF (left diagonal) -->
  <line x1="388" y1="160" x2="295" y2="202" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- CLI → Parser (right diagonal) -->
  <line x1="472" y1="160" x2="545" y2="202" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- data/songs.csv → TF-IDF (dashed red, horizontal) -->
  <line x1="165" y1="240" x2="185" y2="240" stroke="#c0392b" stroke-width="2"
        stroke-dasharray="4,2" marker-end="url(#arrRed)"/>

  <!-- TF-IDF → Candidate Pool -->
  <line x1="295" y1="276" x2="295" y2="325" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Parser → Structured Prefs -->
  <line x1="545" y1="276" x2="545" y2="325" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Candidate Pool → Scorer (diagonal) -->
  <line x1="295" y1="381" x2="360" y2="422" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Structured Prefs → Scorer (diagonal) -->
  <line x1="545" y1="381" x2="500" y2="422" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Scorer → Ranked Output -->
  <line x1="430" y1="486" x2="413" y2="532" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Scorer right edge → Testing panel (dashed orange) -->
  <line x1="570" y1="454" x2="592" y2="454" stroke="#e67e22" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrOrange)"/>

  <!-- Ranked Output right edge → Testing panel (dashed orange) -->
  <line x1="565" y1="562" x2="592" y2="562" stroke="#e67e22" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrOrange)"/>

</svg>
